name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phpunit-standard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpunit:9.6
          coverage: none

      - name: Run PHPUnit
        run: phpunit --configuration phpunit.xml

  phpunit-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP (${{ matrix.php-version }})
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: phpunit:9.6
          coverage: none

      - name: Run PHPUnit (PHP ${{ matrix.php-version }})
        run: phpunit --configuration phpunit.xml
